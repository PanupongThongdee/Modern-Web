<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


</head>
<body>
    <h1>ตัวอย่าง JavaScript แบบฝั่งใน html</h1>
    <button onclick="showMessage()">กดเพื่อแสดงข้อความ</button>
    <script>
        function showMessage() {
            alert("สวัสดี! นี่คือข้อความจาก JavaScript");
        }

        console.log("JavaScript กำลังทำงานอยู่ในเบราว์เซอร์...");
    </script>
</body>
</html>
