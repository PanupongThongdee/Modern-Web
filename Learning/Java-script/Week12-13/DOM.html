<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body {
            font-family: "Prompt", sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
        }

        #header {
            color: darkblue;
        }

        .item {
            padding: 4px 0;
        }

        .highlight {
            background: yellow;
        }

        button {
            padding: 8px 16px;
            margin: 4px 4px 10px 0;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #00bfff;
            color: white;
            font-size: 14px;
        }

        button:hover {
            background: #0095d6;
        }

        #logBox {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
            border-left: 4px solid #00d26a;
            font-family: Consolas, monospace;
            white-space: pre-wrap;
        }
    </style>

<body>
    <h1 id="header">หัวข้อเดิมบนหน้าเว็ป</h1>
    <p>รายการตัวอย่าง (class = "item")</p>
    <ul>
        <li class="item">รายการที่ 1</li>
        <li class="item">รายการที่ 2</li>
        <li class="item">รายการที่ 3</li>
    </ul>

    <div style="margin-top: 20px; margin-bottom: 10px;">
        <button onclick="changeTitle()">เปลี่ยนข้อความ + สีของหัวข้อ</button>
        <button onclick="highlightItem()">ไฮไลท์ .item ทั้งหมด</button>
        <button onclick="addParagraph()">สร้างและเพิ่มข้อความใหม่</button>
    </div>

    <div id="logBox">log: รอกดปุ่มเพื่อดูการเปลี่ยนแปลง...</div>

    <script>
        const title = document.getElementById("header");
        const item = document.querySelectorAll(".item");
        const logBox = document.getElementById("logBox");

        function log(message){
            console.log(message);
            logBox.textContent += "\n" + message;
        }

        function changeTitle(){
            title.textContent = "หัวข้อถูกเปลี่ยนโดย JavaScript";
            title.style.color ="red";
            title.style.fontWeight = "bold";
            log("เปลี่ยนข้อความแล้ว");
            
        }

        function highlightItem(){
            item.forEach((item,index)=>{
                item.classList.add("highlight");
                item.textContent = "รายการที่" + (index + 1) + "(ถูกไฮไลต์)";
            })
            log("เพิ่มคลาส .highlight ให้ .item ทั้งหมด");
        }

        function addParagraph(){
            let p = document.createElement("p");
            p.textContent = "ข้อความใหม่ที่เพิ่มจาก Javascript เวลา: " + new Date().toLocaleTimeString();
            document.body.appendChild(p);
            log("สร้าง <p> ใหม่และ appangChild ลงท้าย  <body>");
        }
    </script>
</body>
</html>
