<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
        padding: 10px 20px;
        font-size: 12px;
        background-color: rgb(59, 217, 238);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
       }
       button:hover{
        background-color: rgb(41, 187, 206);
        opacity: 0.8;
       }

      #output {
            font-size: 15px;
            color: white; 
            background-color: black;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-line;
            min-height: 40px;
        }

       
    </style>
</head>
<body>
    <h2>ตรวจสอบเกรด</h2>
   
    <button onclick="runCode()">Run Code</button>
     <div id="output"></div>
    <script>
        function runCode(){

            let output = [];
            for (let i = 1; i <= 10; i++) {
                if(i % 2 === 0){
                    output.push(i +"(คู่)");
                    console.log(i +"(คู่)");

                } else {
                    output.push(i +"(คี่)");
                    console.log(i +"(คี่)");
                }
            }

            for (let j = 0; j <= 10; j+=2) {
                output.push("นับทีละ2 :"+j);
                console.log("นับทีละ2 :"+j);
            }

            for(let countdown = 10; countdown >=1; countdown--){
                output.push("นับถอยหลัง :"+countdown);
                console.log("นับถอยหลัง :"+countdown);

            }
            document.getElementById("output").textContent = output.join("\n");
           
           
        }
    </script>
    </div>
</body>
</html>
